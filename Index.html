<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survival Dash: Coin Hunter</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

#menu, #shop {
    padding: 20px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    background: orange;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

canvas {
    background: black;
    display: none;
}

#hud {
    display: none;
    position: absolute;
    top: 10px;
    left: 10px;
}

</style>
</head>

<body>

<div id="menu">
    <h1>🎮 Survival Dash</h1>
    <p>Coins: <span id="coinDisplay">0</span></p>

    <button onclick="startGame('level')">Level Mode</button>
    <button onclick="startGame('endless')">Endless Mode</button>
    <button onclick="openShop()">Shop</button>
</div>

<div id="shop" style="display:none;">
    <h2>🛒 Shop</h2>
    <button onclick="buy('shield')">Shield (50 coins)</button>
    <button onclick="buy('slow')">Slow Motion (70 coins)</button>
    <button onclick="backMenu()">Back</button>
</div>

<div id="hud">
    <p>Score: <span id="score">0</span></p>
    <p>Coins: <span id="coins">0</span></p>
</div>

<canvas id="game" width="400" height="600"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

let player, obstacles, coinsArr, score, speed, gameMode, gameRunning;
let coins = localStorage.getItem("coins") || 0;
coins = parseInt(coins);

document.getElementById("coinDisplay").innerText = coins;

let powerups = {
    shield: false,
    slow: false
};

function startGame(mode) {
    gameMode = mode;
    document.getElementById("menu").style.display = "none";
    canvas.style.display = "block";
    document.getElementById("hud").style.display = "block";

    player = {x:180, y:500, w:40, h:40, vy:0, jump:false};
    obstacles = [];
    coinsArr = [];
    score = 0;
    speed = 3;
    gameRunning = true;

    gameLoop();
}

function openShop() {
    document.getElementById("menu").style.display = "none";
    document.getElementById("shop").style.display = "block";
}

function backMenu() {
    document.getElementById("shop").style.display = "none";
    document.getElementById("menu").style.display = "block";
}

function buy(item) {
    if(item === "shield" && coins >= 50) {
        coins -= 50;
        powerups.shield = true;
    }
    if(item === "slow" && coins >= 70) {
        coins -= 70;
        powerups.slow = true;
    }
    saveCoins();
}

function saveCoins() {
    localStorage.setItem("coins", coins);
    document.getElementById("coinDisplay").innerText = coins;
}

document.addEventListener("keydown", e=>{
    if(e.code === "Space" && !player.jump) {
        player.vy = -10;
        player.jump = true;
    }
});

canvas.addEventListener("touchstart", ()=>{
    if(!player.jump){
        player.vy = -10;
        player.jump = true;
    }
});

function spawnObstacle() {
    let x = Math.random() * 360;
    obstacles.push({x:x, y:0, w:40, h:40});
}

function spawnCoin() {
    let x = Math.random() * 360;
    coinsArr.push({x:x, y:0, w:20, h:20});
}

function gameLoop() {
    if(!gameRunning) return;

    ctx.clearRect(0,0,400,600);

    // player physics
    player.y += player.vy;
    player.vy += 0.5;

    if(player.y >= 500) {
        player.y = 500;
        player.jump = false;
    }

    // draw player
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    // obstacles
    if(Math.random() < 0.02) spawnObstacle();
    obstacles.forEach((o,i)=>{
        o.y += speed;
        ctx.fillStyle = "red";
        ctx.fillRect(o.x,o.y,o.w,o.h);

        if(collide(player,o)) {
            if(powerups.shield){
                powerups.shield = false;
                obstacles.splice(i,1);
            } else {
                endGame();
            }
        }
    });

    // coins
    if(Math.random() < 0.03) spawnCoin();
    coinsArr.forEach((c,i)=>{
        c.y += speed;
        ctx.fillStyle = "yellow";
        ctx.fillRect(c.x,c.y,c.w,c.h);

        if(collide(player,c)){
            coins++;
            coinsArr.splice(i,1);
        }
    });

    // speed increase
    if(score % 200 === 0) speed += 0.2;

    score++;
    document.getElementById("score").innerText = score;
    document.getElementById("coins").innerText = coins;

    requestAnimationFrame(gameLoop);
}

function collide(a,b){
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

function endGame(){
    if(gameMode === "endless"){
        player.y = 500;
        return;
    }

    gameRunning = false;
    saveCoins();

    alert("Game Over! Score: " + score);

    location.reload();
}

</script>

</body>
</html>
