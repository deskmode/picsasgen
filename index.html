<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Picsas Gen – Free AI Image Generator</title>

<meta name="description" content="Generate AI images instantly online for free. Picsas Gen AI Photo Builder.">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
    text-align:center;
    padding:20px;
}
h1{
    margin-top:40px;
}
textarea{
    width:90%;
    max-width:500px;
    height:90px;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:20px;
}
button{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    border-radius:10px;
    background:#ff416c;
    color:white;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    opacity:0.9;
}
footer{
    margin-top:60px;
    opacity:0.6;
}
</style>
</head>

<body>

<h1>🔥 Picsas Gen – AI Photo Builder</h1>
<p>Create stunning AI-generated images instantly.</p>

<textarea id="prompt" placeholder="Describe your image..."></textarea>
<br>
<button onclick="generateImage()">Generate Image</button>

<footer>
© 2026 Picsas Gen | Free AI Image Generator
</footer>

<script>
function generateImage(){
    const prompt = document.getElementById("prompt").value.trim();

    if(!prompt){
        alert("Please enter an image description.");
        return;
    }

    const seed = Math.floor(Math.random() * 1000000);
    const imageUrl = "https://image.pollinations.ai/prompt/" 
        + encodeURIComponent(prompt) 
        + "?seed=" + seed + "&width=512&height=512";

    // Direct new tab open method (most stable)
    window.open(imageUrl, "_blank");
}
</script>

</body>
</html>
