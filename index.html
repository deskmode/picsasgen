<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Shadow Survival: Dark Anime Arena</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: black;
  color: white;
}

#menu, #shop {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(black, purple);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

button {
  padding: 12px 20px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #ff0055;
  color: white;
}

#gameCanvas {
  display: none;
  background: black;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="menu">
  <h1>Shadow Survival</h1>
  <button onclick="startGame('level')">Level Mode</button>
  <button onclick="startGame('free')">Free Mode</button>
  <button onclick="openShop()">Shop</button>
</div>

<div id="shop" style="display:none;">
  <h2>Shop</h2>
  <p>Coins: <span id="coinDisplay">0</span></p>
  <button onclick="buyUpgrade('damage')">Upgrade Damage (20)</button>
  <button onclick="buyUpgrade('speed')">Upgrade Speed (20)</button>
  <button onclick="closeShop()">Back</button>
</div>

<canvas id="gameCanvas"></canvas>

<div id="ui"></div>

<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let gameMode = "level";
let player, enemies, coins, score, level;
let touchX = null, touchY = null;

let playerStats = {
  speed: 3,
  damage: 1,
  coins: 0
};

function startGame(mode) {
  gameMode = mode;
  document.getElementById("menu").style.display = "none";
  canvas.style.display = "block";

  player = { x: 200, y: 200, size: 20, hp: 100 };
  enemies = [];
  coins = [];
  score = 0;
  level = 1;

  spawnEnemies();
  gameLoop();
}

function spawnEnemies() {
  enemies = [];
  let count = level * 3;

  for (let i = 0; i < count; i++) {
    enemies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 15,
      speed: 1 + level * 0.3,
      hp: 2
    });
  }
}

canvas.addEventListener("touchmove", (e) => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
});

function update() {
  if (touchX && touchY) {
    let dx = touchX - player.x;
    let dy = touchY - player.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    player.x += (dx/dist) * playerStats.speed;
    player.y += (dy/dist) * playerStats.speed;
  }

  enemies.forEach((e, i) => {
    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    e.x += (dx/dist) * e.speed;
    e.y += (dy/dist) * e.speed;

    if (dist < 20) {
      player.hp -= 0.3;
    }

    if (dist < 30) {
      e.hp -= playerStats.damage * 0.1;
      if (e.hp <= 0) {
        playerStats.coins++;
        enemies.splice(i, 1);
      }
    }
  });

  if (player.hp <= 0 && gameMode === "level") {
    alert("Game Over");
    location.reload();
  }

  if (enemies.length === 0 && gameMode === "level") {
    level++;
    player.hp = 100;
    spawnEnemies();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // player
  ctx.fillStyle = "cyan";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.size, 0, Math.PI*2);
  ctx.fill();

  // enemies
  enemies.forEach(e => {
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size, 0, Math.PI*2);
    ctx.fill();
  });

  document.getElementById("ui").innerHTML =
    "HP: " + Math.floor(player.hp) +
    " | Coins: " + playerStats.coins +
    " | Level: " + level;
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function openShop() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("shop").style.display = "flex";
  document.getElementById("coinDisplay").innerText = playerStats.coins;
}

function closeShop() {
  document.getElementById("shop").style.display = "none";
  document.getElementById("menu").style.display = "flex";
}

function buyUpgrade(type) {
  if (playerStats.coins >= 20) {
    playerStats.coins -= 20;
    if (type === "damage") playerStats.damage += 0.5;
    if (type === "speed") playerStats.speed += 0.5;
    document.getElementById("coinDisplay").innerText = playerStats.coins;
  } else {
    alert("Not enough coins!");
  }
}
</script>

</body>
</html>
