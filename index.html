<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Picsas Gen – Free AI Photo Builder</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#111;
    color:white;
    padding:20px;
}
input{
    width:80%;
    max-width:400px;
    padding:10px;
}
button{
    padding:10px 20px;
    margin-top:10px;
    cursor:pointer;
}
img{
    margin-top:20px;
    max-width:90%;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>Picsas Gen – AI Photo Builder</h1>
<p>Create AI images instantly</p>

<input type="text" id="prompt" placeholder="Enter image prompt">
<br>
<button onclick="generateImage()">Generate Image</button>

<div id="result"></div>

<script>
function generateImage(){
    const prompt = document.getElementById("prompt").value;
    if(!prompt){
        alert("Enter a prompt");
        return;
    }

    const imageUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

    document.getElementById("result").innerHTML =
        `<img src="${imageUrl}" alt="Generated Image">`;
}
</script>

</body>
</html>
