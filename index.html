<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON STRIKE: SHADOW WAR</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; font-family:Arial; overflow:hidden; }

#gameContainer {
  position:relative;
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas {
  background:#000;
  width:100%;
  height:100%;
  max-width:100vw;
  max-height:100vh;
}

.ui {
  position:absolute;
  color:white;
  font-size:14px;
  z-index:10;
}

#hud { top:10px; left:10px; }
#controls {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.btn {
  width:70px;
  height:70px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  color:white;
}

#menu, #gameOver, #loading {
  position:absolute;
  width:100%;
  height:100%;
  background:#000;
  color:#0ff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:20;
}

button {
  padding:12px 25px;
  margin-top:15px;
  font-size:18px;
  background:#0ff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="gameContainer">
  <canvas id="game"></canvas>

  <div id="hud" class="ui"></div>

  <div id="controls">
    <div class="btn" id="left">◀</div>
    <div class="btn" id="shoot">🔥</div>
    <div class="btn" id="right">▶</div>
  </div>

  <div id="loading">Loading...</div>

  <div id="menu" style="display:none">
    <h1>NEON STRIKE</h1>
    <button onclick="startGame()">PLAY</button>
  </div>

  <div id="gameOver" style="display:none">
    <h2>GAME OVER</h2>
    <button onclick="startGame()">RETRY</button>
  </div>
</div>

<script>
// Canvas Setup
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// Game Variables
let player, bullets, enemies, particles;
let score = 0, coins = 0, level = 1;
let gameRunning = false;
let keys = {left:false, right:false, shoot:false};

// Load Sounds (Pixabay Free)
const shootSound = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b47e4.mp3");
const hitSound = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3");
const bgMusic = new Audio("https://cdn.pixabay.com/audio/2022/03/15/audio_7c8c6e1bdf.mp3");
bgMusic.loop = true;

// Player
function createPlayer() {
  return {
    x: canvas.width/2,
    y: canvas.height-120,
    w:40, h:40,
    speed:6,
    health:100
  };
}

// Bullet
function shoot() {
  bullets.push({x:player.x+15, y:player.y, w:10, h:20});
  shootSound.play();
}

// Enemy
function spawnEnemy() {
  enemies.push({
    x: Math.random()*canvas.width,
    y: -50,
    w:40, h:40,
    speed: 2 + level*0.5,
    health: 30 + level*10
  });
}

// Particle Effect
function createExplosion(x,y) {
  for(let i=0;i<10;i++){
    particles.push({
      x,y,
      vx:(Math.random()-0.5)*4,
      vy:(Math.random()-0.5)*4,
      life:20
    });
  }
}

// Controls
document.getElementById("left").ontouchstart=()=>keys.left=true;
document.getElementById("left").ontouchend=()=>keys.left=false;
document.getElementById("right").ontouchstart=()=>keys.right=true;
document.getElementById("right").ontouchend=()=>keys.right=false;
document.getElementById("shoot").ontouchstart=()=>keys.shoot=true;
document.getElementById("shoot").ontouchend=()=>keys.shoot=false;

// Update
function update() {
  if(!gameRunning) return;

  // Move player
  if(keys.left) player.x -= player.speed;
  if(keys.right) player.x += player.speed;

  // Shooting
  if(keys.shoot) shoot();

  // Bullets
  bullets.forEach(b=>b.y -= 10);

  // Enemies
  enemies.forEach(e=>e.y += e.speed);

  // Collision
  bullets.forEach((b,bi)=>{
    enemies.forEach((e,ei)=>{
      if(b.x<e.x+e.w && b.x+b.w>e.x && b.y<e.y+e.h){
        e.health -= 20;
        bullets.splice(bi,1);
        hitSound.play();
        createExplosion(e.x,e.y);

        if(e.health<=0){
          enemies.splice(ei,1);
          score += 10;
          coins += 5;
        }
      }
    });
  });

  // Player hit
  enemies.forEach((e,ei)=>{
    if(e.y > canvas.height){
      player.health -= 10;
      enemies.splice(ei,1);
    }
  });

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
  });
  particles = particles.filter(p=>p.life>0);

  // Spawn enemies
  if(Math.random()<0.02) spawnEnemy();

  // Level up
  if(score>level*100){
    level++;
  }

  // Game Over
  if(player.health<=0){
    gameRunning=false;
    document.getElementById("gameOver").style.display="flex";
  }

  saveData();
}

// Draw
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Player
  ctx.fillStyle="#0ff";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // Bullets
  ctx.fillStyle="yellow";
  bullets.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));

  // Enemies
  ctx.fillStyle="red";
  enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.w,e.h));

  // Particles
  ctx.fillStyle="orange";
  particles.forEach(p=>ctx.fillRect(p.x,p.y,3,3));

  // HUD
  document.getElementById("hud").innerHTML =
    "Score: "+score+"<br>Coins: "+coins+"<br>Health: "+player.health+"<br>Level: "+level;
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Start Game
function startGame() {
  player = createPlayer();
  bullets = [];
  enemies = [];
  particles = [];
  score=0;
  coins = loadData("coins")||0;
  level = loadData("level")||1;

  document.getElementById("menu").style.display="none";
  document.getElementById("gameOver").style.display="none";

  gameRunning=true;
  bgMusic.play();
}

// Storage
function saveData(){
  localStorage.setItem("coins",coins);
  localStorage.setItem("level",level);
}

function loadData(key){
  return localStorage.getItem(key);
}

// Loading
setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  document.getElementById("menu").style.display="flex";
},1500);

loop();
</script>

</body>
</html>
