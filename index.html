<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Anime Survivor</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0a0a0f;
  font-family: Arial;
}
canvas {
  display: block;
}
#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  z-index: 10;
}
button {
  padding: 10px;
  margin-top: 5px;
}
</style>
</head>
<body>
<div id="ui">
  <div>Coins: <span id="coins">0</span></div>
  <div>Level: <span id="level">1</span></div>
  <button onclick="startLevelMode()">Level Mode</button>
  <button onclick="startEndlessMode()">Endless Mode</button>
</div>
<canvas id="game"></canvas><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player, enemies, coins = 0, level = 1;
let mode = "menu";

class Player {
  constructor() {
    this.x = canvas.width/2;
    this.y = canvas.height/2;
    this.size = 20;
    this.speed = 5;
  }
  draw() {
    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
  }
  move(dx, dy) {
    this.x += dx * this.speed;
    this.y += dy * this.speed;
  }
}

class Enemy {
  constructor() {
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.size = 15;
    this.speed = 1 + level*0.3;
  }
  update() {
    let dx = player.x - this.x;
    let dy = player.y - this.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    this.x += dx/dist * this.speed;
    this.y += dy/dist * this.speed;
  }
  draw() {
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
  }
}

function startLevelMode() {
  mode = "level";
  level = 1;
  startGame();
}

function startEndlessMode() {
  mode = "endless";
  startGame();
}

function startGame() {
  player = new Player();
  enemies = [];
  spawnEnemies();
}

function spawnEnemies() {
  enemies = [];
  for(let i=0;i<level+2;i++) {
    enemies.push(new Enemy());
  }
}

function update() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  player.draw();

  enemies.forEach((e, i) => {
    e.update();
    e.draw();

    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if(dist < player.size + e.size) {
      if(mode === "level") {
        alert("Game Over");
        mode = "menu";
      }
    }
  });

  document.getElementById("coins").innerText = coins;
  document.getElementById("level").innerText = level;

  requestAnimationFrame(update);
}

window.addEventListener("keydown", (e) => {
  if(e.key === "ArrowUp") player.move(0,-1);
  if(e.key === "ArrowDown") player.move(0,1);
  if(e.key === "ArrowLeft") player.move(-1,0);
  if(e.key === "ArrowRight") player.move(1,0);
});

update();
</script></body>
</html>
