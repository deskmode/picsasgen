
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NEON STRIKER - Ultimate Combat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'Arial Black', Arial, sans-serif;
            touch-action: none;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2a 100%);
        }

        #gameCanvas {
            max-width: 100%;
            max-height: 100%;
            background: #000;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .control-button {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.3);
            border: 3px solid rgba(0, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #0ff;
            font-weight: bold;
            pointer-events: auto;
            touch-action: none;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transition: all 0.1s;
        }

        .control-button:active {
            transform: scale(0.9);
            background: rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }

        #shootBtn {
            bottom: 100px;
            right: 30px;
        }

        #jumpBtn {
            bottom: 200px;
            right: 30px;
        }

        #specialBtn {
            bottom: 150px;
            right: 130px;
            background: rgba(255, 0, 255, 0.3);
            border-color: rgba(255, 0, 255, 0.8);
            color: #f0f;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        #specialBtn:active {
            background: rgba(255, 0, 255, 0.5);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
        }

        #joystickZone {
            position: absolute;
            bottom: 80px;
            left: 30px;
            width: 140px;
            height: 140px;
            pointer-events: auto;
        }

        #joystickBase {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(100, 100, 150, 0.2);
            border: 3px solid rgba(0, 255, 255, 0.4);
            position: relative;
        }

        #joystickStick {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.6);
            border: 3px solid #0ff;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            color: #fff;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 0 10px #0ff;
        }

        .hud-bar {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 5px;
            margin-bottom: 5px;
            border: 2px solid rgba(0, 255, 255, 0.5);
        }

        .health-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 0, 0, 0.3);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #f00 0%, #ff0 50%, #0f0 100%);
            transition: width 0.3s;
            box-shadow: 0 0 10px #0f0;
        }

        #menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: auto;
        }

        .menu-title {
            font-size: 48px;
            color: #0ff;
            text-shadow: 0 0 30px #0ff, 0 0 60px #0ff;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .menu-btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #0ff 0%, #f0f 100%);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            transition: all 0.3s;
            pointer-events: auto;
        }

        .menu-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
        }

        .hidden {
            display: none !important;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .loading-bar {
            width: 300px;
            height: 30px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #0ff;
        }

        .loading-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ff 0%, #f0f 100%);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 20px #0ff;
        }

        #muteBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 255, 0.3);
            border: 2px solid #0ff;
            border-radius: 50%;
            color: #0ff;
            font-size: 20px;
            pointer-events: auto;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coin-display {
            display: inline-block;
            color: #ffd700;
            text-shadow: 0 0 10px #ffd700;
            font-size: 18px;
            font-weight: bold;
        }

        #gameOver, #levelComplete, #pauseMenu, #shop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: auto;
        }

        .score-text {
            font-size: 32px;
            color: #0ff;
            margin: 10px;
            text-shadow: 0 0 20px #0ff;
        }

        #pauseBtn {
            position: absolute;
            top: 10px;
            right: 70px;
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 255, 0.3);
            border: 2px solid #0ff;
            border-radius: 50%;
            color: #0ff;
            font-size: 20px;
            pointer-events: auto;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upgrade-item {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #0ff;
            border-radius: 10px;
            padding: 15px;
            margin: 10px;
            width: 280px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .upgrade-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            font-size: 14px;
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            background: #555;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="menu-title">NEON STRIKER</div>
        <div style="color: #0ff; margin: 20px;">Loading...</div>
        <div class="loading-bar">
            <div class="loading-fill" id="loadingFill"></div>
        </div>
    </div>

    <div id="menu" class="hidden">
        <div class="menu-title">NEON STRIKER</div>
        <div style="color: #0ff; font-size: 16px; margin-bottom: 30px;">Ultimate Combat Arena</div>
        <button class="menu-btn" id="playBtn">PLAY</button>
        <button class="menu-btn" id="shopBtn">UPGRADES</button>
        <div style="color: #ffd700; margin-top: 20px; font-size: 18px;">
            High Score: <span id="menuHighScore">0</span>
        </div>
    </div>

    <div id="shop" class="hidden">
        <div class="menu-title" style="font-size: 36px;">UPGRADES</div>
        <div style="color: #ffd700; font-size: 20px; margin: 20px;">
            Coins: <span id="shopCoins">0</span>
        </div>
        <div id="upgradeList"></div>
        <button class="menu-btn" id="backBtn">BACK</button>
    </div>

    <div id="gameOver" class="hidden">
        <div class="menu-title">GAME OVER</div>
        <div class="score-text">Score: <span id="finalScore">0</span></div>
        <div class="score-text">Coins: <span id="finalCoins">0</span></div>
        <button class="menu-btn" id="retryBtn">RETRY</button>
        <button class="menu-btn" id="menuBtn">MENU</button>
    </div>

    <div id="levelComplete" class="hidden">
        <div class="menu-title">LEVEL COMPLETE!</div>
        <div class="score-text">Score: <span id="levelScore">0</span></div>
        <div class="score-text">Coins Earned: <span id="levelCoins">0</span></div>
        <button class="menu-btn" id="nextLevelBtn">NEXT LEVEL</button>
    </div>

    <div id="pauseMenu" class="hidden">
        <div class="menu-title" style="font-size: 36px;">PAUSED</div>
        <button class="menu-btn" id="resumeBtn">RESUME</button>
        <button class="menu-btn" id="quitBtn">QUIT</button>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div class="ui-overlay">
        <div id="hud">
            <div class="hud-bar">
                Level: <span id="levelDisplay">1</span> | 
                Score: <span id="scoreDisplay">0</span> | 
                <span class="coin-display">💰 <span id="coinDisplay">0</span></span>
            </div>
            <div class="hud-bar">
                Health:
                <div class="health-bar">
                    <div class="health-fill" id="healthBar" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <button id="muteBtn">🔊</button>
        <button id="pauseBtn">⏸</button>

        <div id="joystickZone">
            <div id="joystickBase">
                <div id="joystickStick"></div>
            </div>
        </div>

        <button class="control-button" id="shootBtn">🔫</button>
        <button class="control-button" id="jumpBtn">⬆</button>
        <button class="control-button" id="specialBtn">⚡</button>
    </div>

    <script>
        // ==================== GAME CONFIGURATION ====================
        const CONFIG = {
            width: 1280,
            height: 720,
            gravity: 0.8,
            playerSpeed: 5,
            jumpForce: 15,
            bulletSpeed: 12,
            enemySpeed: 2,
            maxEnemies: 8,
            particleCount: 30,
            fps: 60
        };

        // ==================== GAME STATE ====================
        const GAME = {
            canvas: null,
            ctx: null,
            state: 'loading',
            score: 0,
            coins: 0,
            level: 1,
            paused: false,
            muted: false,
            shake: 0,
            combo: 0,
            lastTime: 0,
            deltaTime: 0
        };

        // ==================== SAVE/LOAD SYSTEM ====================
        const SAVE = {
            load() {
                const data = localStorage.getItem('neonStrikerSave');
                if (data) {
                    const parsed = JSON.parse(data);
                    GAME.coins = parsed.coins || 0;
                    GAME.highScore = parsed.highScore || 0;
                    GAME.level = parsed.level || 1;
                    PLAYER.upgrades = parsed.upgrades || {damage: 0, health: 0, fireRate: 0, speed: 0};
                    GAME.muted = parsed.muted || false;
                }
            },
            save() {
                const data = {
                    coins: GAME.coins,
                    highScore: GAME.highScore || 0,
                    level: GAME.level,
                    upgrades: PLAYER.upgrades,
                    muted: GAME.muted
                };
                localStorage.setItem('neonStrikerSave', JSON.stringify(data));
            }
        };

        // ==================== AUDIO SYSTEM ====================
        const AUDIO = {
            ctx: null,
            sounds: {},
            init() {
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('Audio not supported');
                }
            },
            play(type, volume = 0.3) {
                if (GAME.muted || !this.ctx) return;
                
                const oscillator = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(this.ctx.destination);
                
                let freq = 440;
                let duration = 0.1;
                
                switch(type) {
                    case 'shoot':
                        freq = 800;
                        oscillator.type = 'square';
                        duration = 0.05;
                        break;
                    case 'hit':
                        freq = 200;
                        oscillator.type = 'sawtooth';
                        duration = 0.1;
                        break;
                    case 'explosion':
                        freq = 100;
                        oscillator.type = 'sawtooth';
                        duration = 0.3;
                        volume = 0.5;
                        break;
                    case 'coin':
                        freq = 1000;
                        oscillator.type = 'sine';
                        duration = 0.1;
                        break;
                    case 'jump':
                        freq = 600;
                        oscillator.type = 'sine';
                        duration = 0.15;
                        break;
                    case 'levelup':
                        freq = 1200;
                        oscillator.type = 'sine';
                        duration = 0.3;
                        break;
                }
                
                gainNode.gain.setValueAtTime(volume, this.ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                
                oscillator.frequency.setValueAtTime(freq, this.ctx.currentTime);
                oscillator.start(this.ctx.currentTime);
                oscillator.stop(this.ctx.currentTime + duration);
            }
        };

        // ==================== PLAYER ====================
        const PLAYER = {
            x: 100,
            y: 400,
            width: 40,
            height: 60,
            vx: 0,
            vy: 0,
            health: 100,
            maxHealth: 100,
            onGround: false,
            facingRight: true,
            shootCooldown: 0,
            specialCooldown: 0,
            invincible: 0,
            upgrades: {
                damage: 0,
                health: 0,
                fireRate: 0,
                speed: 0
            },
            
            update() {
                // Apply joystick movement
                if (CONTROLS.joystick.active) {
                    this.vx = CONTROLS.joystick.x * (CONFIG.playerSpeed + this.upgrades.speed * 0.5);
                    if (this.vx > 0) this.facingRight = true;
                    if (this.vx < 0) this.facingRight = false;
                } else {
                    this.vx *= 0.85;
                }
                
                // Apply gravity
                if (!this.onGround) {
                    this.vy += CONFIG.gravity;
                }
                
                // Update position
                this.x += this.vx;
                this.y += this.vy;
                
                // Ground collision
                if (this.y + this.height >= CONFIG.height - 100) {
                    this.y = CONFIG.height - 100 - this.height;
                    this.vy = 0;
                    this.onGround = true;
                } else {
                    this.onGround = false;
                }
                
                // Screen boundaries
                if (this.x < 0) this.x = 0;
                if (this.x + this.width > CONFIG.width) this.x = CONFIG.width - this.width;
                
                // Update cooldowns
                if (this.shootCooldown > 0) this.shootCooldown--;
                if (this.specialCooldown > 0) this.specialCooldown--;
                if (this.invincible > 0) this.invincible--;
                
                this.maxHealth = 100 + this.upgrades.health * 20;
            },
            
            jump() {
                if (this.onGround) {
                    this.vy = -CONFIG.jumpForce;
                    this.onGround = false;
                    AUDIO.play('jump');
                }
            },
            
            shoot() {
                const fireRate = 15 - this.upgrades.fireRate * 2;
                if (this.shootCooldown <= 0) {
                    const bullet = {
                        x: this.x + (this.facingRight ? this.width : 0),
                        y: this.y + this.height / 2,
                        vx: (this.facingRight ? 1 : -1) * CONFIG.bulletSpeed,
                        vy: 0,
                        damage: 20 + this.upgrades.damage * 5,
                        type: 'player',
                        width: 15,
                        height: 5
                    };
                    BULLETS.push(bullet);
                    this.shootCooldown = fireRate;
                    AUDIO.play('shoot', 0.2);
                    PARTICLES.create(bullet.x, bullet.y, '#0ff', 5);
                }
            },
            
            special() {
