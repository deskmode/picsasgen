<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PicsasGen AI Image Builder | Free AI Photo Generator Online</title>

<meta name="description" content="PicsasGen is a free AI photo builder powered by OpenRouter and Gemma model. Generate stunning AI images instantly from text prompts.">
<meta name="keywords" content="AI image generator, free AI photo builder, PicsasGen, OpenRouter AI, Gemma AI model, text to image generator">
<meta name="author" content="PicsasGen">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1829/1829586.png">

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#1e1e2f,#2a2a40);
    color:white;
    text-align:center;
}

header{
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.container{
    padding:20px;
}

input{
    width:80%;
    max-width:500px;
    padding:12px;
    border-radius:8px;
    border:none;
    margin-bottom:15px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#ff4b2b;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ff416c;
}

#result img{
    margin-top:20px;
    max-width:90%;
    border-radius:10px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.5);
}

footer{
    margin-top:40px;
    padding:20px;
    font-size:14px;
    opacity:0.7;
}
</style>
</head>

<body>

<header>
🔥 PicsasGen AI Image Builder
</header>

<div class="container">
    <h2>Create Stunning AI Images</h2>
    <input type="text" id="prompt" placeholder="Enter your image prompt here...">
    <br>
    <button onclick="generateImage()">Generate Image</button>

    <div id="loading" style="display:none;margin-top:20px;">
        Generating Image...
    </div>

    <div id="result"></div>
</div>

<footer>
© 2026 PicsasGen | Powered by OpenRouter Gemma Model
</footer>

<script>

async function generateImage(){
    const prompt = document.getElementById("prompt").value;
    const resultDiv = document.getElementById("result");
    const loading = document.getElementById("loading");

    if(!prompt){
        alert("Please enter a prompt!");
        return;
    }

    resultDiv.innerHTML = "";
    loading.style.display = "block";

    try{
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions",{
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer sk-or-v1-e26...533"
            },
            body: JSON.stringify({
                model:"google/gemma-3n-e4b-it:free",
                messages:[
                    {role:"user",content:`Generate a direct image URL for: ${prompt}`}
                ]
            })
        });

        const data = await response.json();
        loading.style.display = "none";

        if(data.choices && data.choices.length > 0){
            const imageUrl = data.choices[0].message.content;
            resultDiv.innerHTML = `<img src="${imageUrl}" alt="AI Generated Image">`;
        }else{
            resultDiv.innerHTML = "Error generating image.";
        }

    }catch(error){
        loading.style.display = "none";
        resultDiv.innerHTML = "Something went wrong.";
        console.error(error);
    }
}

</script>

</body>
</html>
