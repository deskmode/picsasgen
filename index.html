<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Picsas Gen – Free AI Photo Builder Online</title>

<meta name="description" content="Picsas Gen is a free AI image generator. Create stunning AI photos instantly from text prompts online.">
<meta name="keywords" content="AI image generator, free AI photo builder, text to image, online AI image tool">
<meta name="author" content="Picsas Gen">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#141e30,#243b55);
    color:white;
    text-align:center;
    padding:20px;
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

p{
    opacity:0.8;
}

.input-box{
    margin-top:20px;
}

textarea{
    width:90%;
    max-width:500px;
    height:80px;
    padding:10px;
    border-radius:8px;
    border:none;
    resize:none;
    font-size:14px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#ff4b2b;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff416c;
}

#loading{
    margin-top:20px;
    display:none;
}

img{
    margin-top:25px;
    max-width:90%;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.download-btn{
    display:none;
    margin-top:15px;
    background:#00c853;
}

footer{
    margin-top:40px;
    opacity:0.6;
    font-size:14px;
}
</style>
</head>

<body>

<h1>🔥 Picsas Gen – AI Photo Builder</h1>
<p>Create stunning AI-generated images instantly.</p>

<div class="input-box">
<textarea id="prompt" placeholder="Describe your image..."></textarea>
<br>
<button onclick="generateImage()">Generate Image</button>
</div>

<div id="loading">Generating Image...</div>
<div id="result"></div>
<button class="download-btn" id="downloadBtn">Download Image</button>

<footer>
© 2026 Picsas Gen | Free AI Image Generator
</footer>

<script>
function generateImage(){
    const prompt = document.getElementById("prompt").value.trim();
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");
    const downloadBtn = document.getElementById("downloadBtn");

    if(!prompt){
        alert("Please enter an image description.");
        return;
    }

    loading.style.display = "block";
    result.innerHTML = "";
    downloadBtn.style.display = "none";

    const imageUrl = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);

    const img = new Image();
    img.src = imageUrl;

    img.onload = function(){
        loading.style.display = "none";
        result.innerHTML = "";
        result.appendChild(img);

        downloadBtn.style.display = "inline-block";
        downloadBtn.onclick = function(){
            window.open(imageUrl, "_blank");
        }
    };

    img.onerror = function(){
        loading.style.display = "none";
        result.innerHTML = "Error generating image. Try again.";
    };
}
</script>

</body>
</html>
